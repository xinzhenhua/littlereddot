            async function reorderPdf(file, orderInput) {
                const { PDFDocument } = PDFLib;
                const pdfBytes = await file.arrayBuffer();
                const pdf = await PDFDocument.load(pdfBytes);
                const totalPages = pdf.getPageCount();
                
                const order = orderInput.split(',').map(n => parseInt(n.trim()) - 1);
                const validOrder = order.filter(i => i >= 0 && i < totalPages);
                
                const newPdf = await PDFDocument.create();
                const pages = await newPdf.copyPages(pdf, validOrder);
                pages.forEach(page => newPdf.addPage(page));
                
                const bytes = await newPdf.save();
                const blob = new Blob([bytes], { type: 'application/pdf' });
                return [{ blob, name: '重排_' + file.name, size: blob.size }];
            }

            async function createJigsawPdf(files, perRow) {
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                
                const cellSize = 180;
                const margin = 40;
                const pageWidth = perRow * cellSize + margin * 2;
                const pageHeight = 400;
                
                for (let i = 0; i < files.length; i += perRow) {
                    const page = pdfDoc.addPage([pageWidth, pageHeight]);
                    const batch = files.slice(i, i + perRow);
                    
                    for (let j = 0; j < batch.length; j++) {
                        const file = batch[j];
                        const imgBytes = await file.arrayBuffer();
                        let image;
                        if (file.type.includes('png')) {
                            image = await pdfDoc.embedPng(imgBytes);
                        } else {
                            image = await pdfDoc.embedJpg(imgBytes);
                        }
                        
                        const scale = Math.min(
                            cellSize / image.width,
                            cellSize / image.height
                        ) * 0.9;
                        
                        const width = image.width * scale;
                        const height = image.height * scale;
                        
                        const x = margin + j * cellSize + (cellSize - width) / 2;
                        const y = (pageHeight - height) / 2;
                        
                        page.drawImage(image, { x, y, width, height });
                    }
                }
                
                const bytes = await pdfDoc.save();
                const blob = new Blob([bytes], { type: 'application/pdf' });
                return [{ blob, name: '拼图.pdf', size: blob.size }];
            }

            async function pdfToLongImage(file) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const numPages = Math.min(pdf.numPages, 5);
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                let totalHeight = 0;
                const pageCanvases = [];
                let maxWidth = 0;
                
                for (let i = 1; i <= numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1 });
                    
                    const pageCanvas = document.createElement('canvas');
                    const pageCtx = pageCanvas.getContext('2d');
                    pageCanvas.width = viewport.width;
                    pageCanvas.height = viewport.height;
                    
                    await page.render({ canvasContext: pageCtx, viewport }).promise;
                    
                    pageCanvases.push(pageCanvas);
                    totalHeight += viewport.height;
                    maxWidth = Math.max(maxWidth, viewport.width);
                }
                
                canvas.width = maxWidth;
                canvas.height = totalHeight;
                
                let y = 0;
                for (const pageCanvas of pageCanvases) {
                    ctx.drawImage(pageCanvas, 0, y);
                    y += pageCanvas.height;
                }
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                return [{ blob, name: file.name.replace('.pdf', '_长图.png'), size: blob.size }];
            }

            function parsePages(input, totalPages) {
                const pages = new Set();
                const parts = input.split(',');
                
                for (const part of parts) {
                    if (part.includes('-')) {
                        const [start, end] = part.split('-').map(n => parseInt(n.trim()));
                        for (let i = start; i <= end; i++) {
                            if (i >= 1 && i <= totalPages) pages.add(i - 1);
                        }
                    } else {
                        const p = parseInt(part.trim());
                        if (p >= 1 && p <= totalPages) pages.add(p - 1);
                    }
                }
                
                return Array.from(pages).sort((a, b) => a - b);
            }
        })();
